<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA Pro Journal Cloud - Apex Elite v9.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <script type="module">
        // --- 1. Firebase Core & Modules (FIXED IMPORTS) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // --- 2. Configuration Handling ---
        // หมายเหตุ: สำหรับการใช้งานบน GitHub Pages ของคุณเอง 
        // หากต้องการให้ข้อมูลซิงค์กันจริงๆ คุณต้องนำค่า Firebase Config จากโปรเจกต์ Firebase ของคุณมาวางแทนที่ตรงนี้
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ea-pro-journal-cloud';

        // State
        let tradeHistory = [];
        let viewDate = new Date();
        let currentUser = null;

        // --- 3. Authentication logic (Rule 3) ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Auth Fail:", err); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('statusText').innerText = `Cloud Sync: Active (ID: ${user.uid.substring(0,6)})`;
                syncData();
            } else {
                initAuth();
            }
        });

        // --- 4. Firestore Sync (Rule 1 & 2) ---
        function syncData() {
            if (!currentUser) return;
            const collectionPath = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'trades');
            
            onSnapshot(collectionPath, (snapshot) => {
                tradeHistory = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateDashboard();
            }, (error) => {
                console.error("Sync Error:", error);
            });
        }

        // --- 5. Global Actions ---
        window.saveRecord = async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const editId = document.getElementById('editId').value;
            const dateVal = document.getElementById('tradeDate').value;
            const docId = editId || dateVal;

            const record = {
                rawDate: dateVal,
                date: new Date(dateVal).toLocaleDateString('th-TH'),
                capital: parseFloat(document.getElementById('capital').value),
                profit: parseFloat(document.getElementById('profit').value),
                wins: parseInt(document.getElementById('wins').value),
                losses: parseInt(document.getElementById('losses').value),
                pf: parseFloat(document.getElementById('pf').value) || 0,
                dd: parseFloat(document.getElementById('dd').value) || 0,
                updatedAt: new Date().toISOString()
            };

            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'trades', docId);
                await setDoc(docRef, record);
                showToast('RECORD SYNCED ✅');
                resetForm();
            } catch (err) { showToast('SYNC FAILED ❌', 'bg-rose-600'); }
        };

        window.deleteRecord = async () => {
            const id = document.getElementById('editId').value;
            if (!id || !confirm('ยืนยันการลบข้อมูลนี้ถาวร?')) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'trades', id);
                await deleteDoc(docRef);
                showToast('DELETED');
                resetForm();
            } catch (err) { showToast('DELETE FAILED'); }
        };

        window.changeMonth = (offset) => {
            viewDate.setMonth(viewDate.getMonth() + offset);
            renderCalendar();
        };

        // --- 6. UI Update Functions ---
        function updateDashboard() {
            let totalP = 0, totalW = 0, totalL = 0, maxDDVal = 0, avgPf = 0;

            tradeHistory.forEach(record => {
                totalP += record.profit; totalW += record.wins; totalL += record.losses;
                if (record.dd > maxDDVal) maxDDVal = record.dd;
                avgPf += record.pf;
            });

            document.getElementById('totalProfit').textContent = `$${totalP.toFixed(2)}`;
            document.getElementById('winRate').textContent = `${(totalW + totalL) > 0 ? (totalW / (totalW + totalL) * 100).toFixed(1) : 0}%`;
            document.getElementById('maxDD').textContent = `${maxDDVal.toFixed(2)}%`;
            document.getElementById('expectancy').textContent = tradeHistory.length > 0 ? (avgPf / tradeHistory.length).toFixed(2) : "0.00";

            renderCalendar();
        }

        function renderCalendar() {
            const calendarBody = document.getElementById('calendarBody');
            const calendarMonthLabel = document.getElementById('calendarMonth');
            calendarBody.innerHTML = '';

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            calendarMonthLabel.innerText = new Intl.DateTimeFormat('th-TH', { month: 'long', year: 'numeric' }).format(viewDate);

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = "min-h-[80px] md:min-h-[120px] opacity-0";
                calendarBody.appendChild(empty);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const currentStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dailyTrades = tradeHistory.filter(t => t.rawDate === currentStr);
                
                const dayDiv = document.createElement('div');
                dayDiv.className = "min-h-[80px] md:min-h-[120px] p-2 rounded-2xl border border-white/5 bg-white/5 flex flex-col justify-between transition-all active:scale-95";
                
                let dayContent = `<span class="text-[10px] font-black opacity-20">${day}</span>`;

                if (dailyTrades.length > 0) {
                    const totalProfit = dailyTrades.reduce((a, b) => a + b.profit, 0);
                    const isWin = totalProfit >= 0;
                    dayDiv.className += isWin ? " border-emerald-500/40 bg-emerald-500/10" : " border-rose-500/40 bg-rose-500/10";
                    dayContent = `
                        <div class="flex justify-between items-start">
                            <span class="text-[11px] font-black ${isWin ? 'text-emerald-400' : 'text-rose-400'}">${day}</span>
                        </div>
                        <div class="text-center flex-1 flex flex-col justify-center">
                            <p class="text-sm md:text-xl font-black ${isWin ? 'text-emerald-400' : 'text-rose-400'} font-mono leading-none">
                                ${isWin ? '+' : ''}${Math.round(totalProfit)}
                            </p>
                        </div>
                    `;
                    dayDiv.onclick = () => editRecord(dailyTrades[0]);
                    dayDiv.style.cursor = "pointer";
                }

                dayDiv.innerHTML = dayContent;
                calendarBody.appendChild(dayDiv);
            }
        }

        function editRecord(record) {
            document.getElementById('editId').value = record.id;
            document.getElementById('tradeDate').value = record.rawDate;
            document.getElementById('capital').value = record.capital;
            document.getElementById('profit').value = record.profit;
            document.getElementById('wins').value = record.wins;
            document.getElementById('losses').value = record.losses;
            document.getElementById('pf').value = record.pf;
            document.getElementById('dd').value = record.dd;
            document.getElementById('submitBtn').innerText = "Update Cloud Record";
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('deleteBtn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.resetForm = () => {
            document.getElementById('tradeForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('tradeDate').valueAsDate = new Date();
            document.getElementById('submitBtn').innerText = "Save to Cloud";
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('deleteBtn').classList.add('hidden');
        };

        function showToast(msg, color = 'bg-blue-600') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 ${color} px-8 py-4 rounded-full shadow-2xl transition-all z-50 flex items-center gap-3 opacity-100`;
            setTimeout(() => { toast.classList.replace('opacity-100', 'opacity-0'); }, 3000);
        }

        document.getElementById('tradeDate').valueAsDate = new Date();
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input { background: rgba(30, 41, 59, 0.6) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        @media (max-width: 640px) { .calendar-grid { gap: 4px; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 max-w-7xl mx-auto">

    <!-- Simple Header -->
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
            <div class="p-3 bg-blue-600 rounded-2xl shadow-xl">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            </div>
            <div>
                <h1 class="text-3xl font-black italic uppercase tracking-tighter">Apex <span class="text-blue-500">Journal</span></h1>
                <p id="statusText" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Connecting to Cloud...</p>
            </div>
        </div>
        <button onclick="window.location.reload()" class="p-3 glass rounded-xl hover:bg-white/10 transition-all">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
        </button>
    </header>

    <!-- KPI Row -->
    <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
        <div class="glass p-6 rounded-3xl border-t border-blue-500/20 shadow-lg">
            <p class="text-[10px] uppercase text-blue-400 font-black tracking-widest">Profit</p>
            <h3 id="totalProfit" class="text-2xl font-bold font-mono">$0.00</h3>
        </div>
        <div class="glass p-6 rounded-3xl border-t border-emerald-500/20 shadow-lg">
            <p class="text-[10px] uppercase text-emerald-400 font-black tracking-widest">Win Rate</p>
            <h3 id="winRate" class="text-2xl font-bold font-mono">0%</h3>
        </div>
        <div class="glass p-6 rounded-3xl border-t border-amber-500/20 shadow-lg">
            <p class="text-[10px] uppercase text-amber-400 font-black tracking-widest">PF</p>
            <h3 id="expectancy" class="text-2xl font-bold font-mono">0.00</h3>
        </div>
        <div class="glass p-6 rounded-3xl border-t border-rose-500/20 shadow-lg">
            <p class="text-[10px] uppercase text-rose-400 font-black tracking-widest">Max DD</p>
            <h3 id="maxDD" class="text-2xl font-bold font-mono">0%</h3>
        </div>
    </section>

    <!-- Workspace -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <!-- Entry Terminal -->
        <section class="lg:col-span-4 glass p-8 rounded-[3rem] h-fit sticky top-10">
            <h2 class="text-xl font-bold text-white mb-6 italic uppercase tracking-widest">Daily Terminal</h2>
            <form id="tradeForm" onsubmit="saveRecord(event)" class="space-y-5">
                <input type="hidden" id="editId">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-500 uppercase px-2">Date</label>
                    <input type="date" id="tradeDate" required class="w-full p-4 rounded-2xl text-sm font-bold outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase px-2">Capital ($)</label>
                        <input type="number" id="capital" step="0.01" required class="w-full p-4 rounded-2xl text-sm font-bold outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase px-2">Net Profit ($)</label>
                        <input type="number" id="profit" step="0.01" required class="w-full p-4 rounded-2xl text-sm font-bold outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase px-2">Wins</label>
                        <input type="number" id="wins" required class="w-full p-4 rounded-2xl text-sm font-bold outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase px-2">Losses</label>
                        <input type="number" id="losses" required class="w-full p-4 rounded-2xl text-sm font-bold outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-blue-500 uppercase px-2">PF</label>
                        <input type="number" id="pf" step="0.01" class="w-full p-4 rounded-2xl text-sm font-bold outline-none border-blue-500/20">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-rose-500 uppercase px-2">DD (%)</label>
                        <input type="number" id="dd" step="0.01" class="w-full p-4 rounded-2xl text-sm font-bold outline-none border-rose-500/20">
                    </div>
                </div>
                <div class="pt-4 space-y-3">
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase text-xs tracking-widest active:scale-95 transition-all">Save to Cloud</button>
                    <div class="flex gap-2">
                        <button type="button" id="cancelBtn" class="hidden flex-1 glass py-4 rounded-2xl text-[10px] font-black uppercase" onclick="resetForm()">Cancel</button>
                        <button type="button" id="deleteBtn" class="hidden flex-1 bg-rose-500/10 text-rose-500 py-4 rounded-2xl text-[10px] font-black uppercase" onclick="deleteRecord()">Delete</button>
                    </div>
                </div>
            </form>
        </section>

        <!-- Calendar Display -->
        <section class="lg:col-span-8">
            <div class="glass p-6 md:p-10 rounded-[3.5rem] shadow-2xl">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 id="calendarMonth" class="text-3xl md:text-4xl font-black text-white uppercase italic leading-none">Month Year</h2>
                        <p id="winCount" class="text-[11px] text-emerald-400 font-bold uppercase mt-2 tracking-widest">0 Win Days</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="p-4 glass rounded-2xl hover:bg-white/10 transition-all">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg>
                        </button>
                        <button onclick="changeMonth(1)" class="p-4 glass rounded-2xl hover:bg-white/10 transition-all">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                    </div>
                </div>

                <div class="calendar-grid mb-3">
                    <div class="text-[10px] font-black text-slate-700 text-center uppercase">Sun</div>
                    <div class="text-[10px] font-black text-slate-700 text-center uppercase">Mon</div>
                    <div class="text-[10px] font-black text-slate-700 text-center uppercase">Tue</div>
                    <div class="text-[10px] font-black text-slate-700 text-center uppercase">Wed</div>
                    <div class="text-[10px] font-black text-slate-700 text-center uppercase">Thu</div>
                    <div class="text-[10px] font-black text-slate-700 text-center uppercase">Fri</div>
                    <div class="text-[10px] font-black text-slate-700 text-center uppercase">Sat</div>
                </div>
                <div id="calendarBody" class="calendar-grid"></div>
            </div>
        </section>
    </div>

    <!-- Floating Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 opacity-0 pointer-events-none transition-all duration-300 z-50">
        <div class="flex items-center gap-3 px-8 py-4 rounded-full shadow-2xl">
            <div class="w-2 h-2 bg-white rounded-full animate-pulse"></div>
            <span id="toastMsg" class="text-[10px] font-black text-white tracking-widest uppercase">Syncing...</span>
        </div>
    </div>

</body>
</html>
