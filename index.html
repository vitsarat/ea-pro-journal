<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Cyber Elite - Ultimate v15.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        
        :root {
            --primary: #10b981;
            --blue: #3b82f6;
            --amber: #f59e0b;
            --rose: #f43f5e;
            --bg: #010409;
            --card-bg: rgba(13, 20, 33, 0.7);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.15) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 40%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            color: #f1f5f9; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass { 
            background: var(--card-bg); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.8);
            border-radius: 2rem;
        }

        .bottom-sheet { 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            transform: translateY(100%); 
        }
        .bottom-sheet.active { transform: translateY(0); }

        input { 
            background: rgba(0, 0, 0, 0.4) !important; 
            border: 1px solid rgba(16, 185, 129, 0.2) !important; 
            color: white !important; 
            outline: none; 
            border-radius: 1rem !important; 
            padding: 1rem !important; 
            width: 100%; 
            text-align: center; 
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary) !important; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        @media (max-width: 640px) { .cal-grid { gap: 6px; } }

        .day-card {
            aspect-ratio: 1/1.3;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.01);
        }
        .day-card:active { transform: scale(0.9); }

        .p-bar-container {
            position: absolute; bottom: 8px; left: 8px; right: 8px; height: 4px;
            background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;
        }
        .p-bar-fill { height: 100%; transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); border-radius: 10px; }

        .metric-card { 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-left: 4px solid transparent;
        }
        .metric-card:active { transform: scale(0.95); opacity: 0.8; }
        .metric-card:hover { border-left-color: var(--primary); background: rgba(255,255,255,0.03); }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(16, 185, 129, 0.2); }
            50% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
            100% { box-shadow: 0 0 5px rgba(16, 185, 129, 0.2); }
        }
        .glow-active { animation: pulse-glow 2s infinite; }

        .btn-cyber {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.3);
        }
        
        .tab-btn { transition: all 0.3s; border-bottom: 2px solid transparent; }
        .tab-btn.active { border-bottom-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body class="safe-area-inset-bottom">

    <div class="p-4 md:p-10 max-w-6xl mx-auto">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-12 pt-4 px-2">
            <div class="flex items-center gap-6">
                <div class="relative">
                    <div class="absolute inset-0 bg-emerald-500 blur-2xl opacity-30 animate-pulse"></div>
                    <div class="relative p-4 bg-black border border-emerald-500/50 rounded-2xl shadow-[0_0_20px_rgba(16,185,129,0.2)]">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                </div>
                <div>
                    <h1 class="text-3xl font-black italic tracking-widest text-white leading-none">APEX <span class="text-emerald-500">ULTIMATE</span></h1>
                    <div class="flex items-center gap-2 mt-2">
                        <div class="px-2 py-0.5 bg-emerald-500/10 border border-emerald-500/20 rounded text-[8px] font-black text-emerald-400 uppercase tracking-widest">ระบบคลาวด์อัจฉริยะทำงานอยู่</div>
                    </div>
                </div>
            </div>
            <button onclick="fetchData()" class="p-4 glass rounded-2xl active:rotate-180 transition-all duration-1000 border-emerald-500/10">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            </button>
        </header>

        <!-- Dynamic KPI Grid -->
        <div class="mb-4 px-2 flex justify-between items-end">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em]">สรุปผลการเทรดภาพรวม</h2>
            <p class="text-[9px] text-emerald-400 font-bold italic">แตะที่การ์ดเพื่อเปลี่ยนตัวเลือก</p>
        </div>
        <section id="kpiContainer" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
            <!-- Rendered by JS -->
        </section>

        <!-- Master Calendar UI -->
        <div class="glass p-6 md:p-12 mb-12 border-emerald-500/5 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-[0.03] pointer-events-none uppercase font-black text-8xl italic">CALENDAR</div>
            <div class="flex justify-between items-center mb-10 px-4 relative z-10">
                <div class="flex flex-col">
                    <span class="text-[10px] text-emerald-500 font-black tracking-[0.5em] uppercase mb-1">ตารางบันทึกผลเทรดรายวัน</span>
                    <h2 id="calMonth" class="text-4xl font-black text-white uppercase italic tracking-tighter">Month</h2>
                </div>
                <div class="flex gap-4 bg-black/40 p-3 rounded-2xl border border-white/5 shadow-inner">
                    <button onclick="changeMonth(-1)" class="p-2 hover:text-emerald-400 transition-colors"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg></button>
                    <div class="w-px h-6 bg-white/10"></div>
                    <button onclick="changeMonth(1)" class="p-2 hover:text-emerald-400 transition-colors"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg></button>
                </div>
            </div>
            <div class="cal-grid mb-8 text-[11px] font-black text-slate-600 text-center uppercase tracking-[0.3em]">
                <div>อา.</div><div>จ.</div><div>อ.</div><div>พ.</div><div>พฤ.</div><div>ศ.</div><div>ส.</div>
            </div>
            <div id="calBody" class="cal-grid"></div>
        </div>

        <!-- History Logs -->
        <div class="mb-28">
            <div class="flex justify-between items-end mb-6 px-4">
                <h2 class="text-xs font-black text-white uppercase tracking-[0.5em]">ประวัติย้อนหลังล่าสุด</h2>
                <span class="text-[10px] text-emerald-500/50 font-bold uppercase tracking-widest" id="logCount">0 รายการถูกจัดเก็บ</span>
            </div>
            <div id="historyList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <div class="fixed bottom-12 right-8 z-40">
        <div class="absolute inset-0 bg-emerald-500 blur-3xl opacity-20 scale-150 animate-pulse"></div>
        <button onclick="toggleModal('entryModal', true)" class="relative w-20 h-20 bg-gradient-to-tr from-emerald-600 to-emerald-400 text-white rounded-[2.2rem] shadow-[0_15px_40px_rgba(16,185,129,0.4)] flex items-center justify-center active:scale-90 transition-all border border-white/20">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <!-- 🛸 Entry Bottom Sheet -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[50] hidden opacity-0 transition-all duration-500" onclick="closeAllModals()"></div>
    <div id="entryModal" class="bottom-sheet fixed bottom-0 left-0 right-0 glass rounded-t-[4rem] z-[60] p-10 pb-16 shadow-2xl max-w-2xl mx-auto border-t border-emerald-500/30">
        <div class="w-20 h-1 bg-white/10 rounded-full mx-auto mb-10"></div>
        <h2 class="text-center font-black text-emerald-400 text-xl uppercase tracking-widest mb-8">บันทึกผลเทรดวันนี้</h2>
        <form id="tradeForm" onsubmit="saveToSheet(event)" class="space-y-8">
            <div class="flex justify-center bg-black/40 p-4 rounded-2xl border border-white/5">
                <input type="date" id="tradeDate" required class="!bg-transparent !border-none !text-emerald-400 !font-black !text-sm uppercase tracking-widest">
            </div>
            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-2"><label class="text-[10px] text-emerald-400/80 font-black uppercase text-center block tracking-widest">กำไรสุทธิ ($)</label><input type="number" id="profit" step="0.01" required placeholder="0.00"></div>
                <div class="space-y-2"><label class="text-[10px] text-blue-400/80 font-black uppercase text-center block tracking-widest">เงินทุนเริ่มต้น ($)</label><input type="number" id="capital" step="0.01" required value="30"></div>
                <div class="space-y-2"><label class="text-[10px] text-slate-500 font-black uppercase text-center block tracking-widest">ไม้ที่ชนะ (Wins)</label><input type="number" id="wins" required value="0"></div>
                <div class="space-y-2"><label class="text-[10px] text-slate-500 font-black uppercase text-center block tracking-widest">ไม้ที่แพ้ (Losses)</label><input type="number" id="losses" required value="0"></div>
                <div class="space-y-2"><label class="text-[10px] text-slate-600 font-black uppercase text-center block tracking-widest">ค่าความคุ้มค่า (PF)</label><input type="number" id="pf" step="0.01" value="0"></div>
                <div class="space-y-2"><label class="text-[10px] text-slate-600 font-black uppercase text-center block tracking-widest">สูงสุดที่ขาดทุน (%)</label><input type="number" id="dd" step="0.01" value="0"></div>
            </div>
            <div class="flex gap-4">
                <button type="button" onclick="toggleModal('entryModal', false)" class="flex-1 bg-white/5 py-6 rounded-3xl font-black uppercase text-[10px] tracking-widest text-slate-500">ยกเลิก</button>
                <button type="submit" class="flex-[2] btn-cyber py-6 rounded-3xl font-black uppercase text-[10px] tracking-widest text-white active:scale-95 transition-all">ยืนยันการบันทึกข้อมูล</button>
            </div>
        </form>
    </div>

    <!-- 🛸 Metric Selector Drawer -->
    <div id="selectorModal" class="bottom-sheet fixed bottom-0 left-0 right-0 glass rounded-t-[4rem] z-[60] p-10 pb-16 shadow-2xl max-w-2xl mx-auto border-t border-blue-500/30">
        <div class="w-20 h-1 bg-white/10 rounded-full mx-auto mb-10"></div>
        <h2 class="text-xl font-black text-white text-center uppercase tracking-[0.2em] mb-8">เลือกข้อมูลที่ต้องการแสดงช่องที่ <span id="activeSlotNum" class="text-emerald-400">1</span></h2>
        <div id="metricOptions" class="grid grid-cols-1 gap-3 max-h-[50vh] overflow-y-auto pr-4">
            <!-- Options injected here -->
        </div>
        <button onclick="toggleModal('selectorModal', false)" class="w-full bg-white/5 py-6 rounded-3xl font-black uppercase text-[10px] tracking-widest text-slate-500 mt-8">ปิดหน้าต่าง</button>
    </div>

    <script>
        const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzkaYWyrZcyKwliZZoK5JlTvdIrCcy_tjKUVr0MPtugKCG20uu3mTs1Oqhhrzy4NSGbqA/exec';
        let tradeHistory = [];
        let viewDate = new Date();
        let activeSlotIdx = 0;

        // Metric Library - All Thai
        const METRICS = {
            profit: { label: 'กำไรสุทธิทั้งหมด', color: 'text-emerald-400', border: 'border-emerald-500/40', format: v => `$${v.toLocaleString(undefined, {minimumFractionDigits: 2})}`, icon: '💰' },
            winrate: { label: 'อัตราการชนะ (%)', color: 'text-blue-400', border: 'border-blue-500/30', format: v => `${v.toFixed(1)}%`, icon: '🎯' },
            pf: { label: 'เฉลี่ยความคุ้มค่า (PF)', color: 'text-amber-400', border: 'border-amber-500/30', format: v => v.toFixed(2), icon: '⚖️' },
            maxdd: { label: 'ขาดทุนสูงสุด (DD)', color: 'text-rose-500', border: 'border-rose-500/30', format: v => `${v.toFixed(1)}%`, icon: '📉' },
            trades: { label: 'จำนวนไม้รวม', color: 'text-indigo-400', border: 'border-indigo-500/30', format: v => `${v} ไม้`, icon: '📊' },
            growth: { label: 'การเติบโตพอร์ต', color: 'text-pink-400', border: 'border-pink-500/30', format: v => `${v.toFixed(1)}%`, icon: '🚀' },
            bestDay: { label: 'กำไรสูงสุด/วัน', color: 'text-lime-400', border: 'border-lime-500/30', format: v => `$${v.toFixed(2)}`, icon: '🏆' },
            avgDay: { label: 'กำไรเฉลี่ยต่อวัน', color: 'text-cyan-400', border: 'border-cyan-500/30', format: v => `$${v.toFixed(2)}`, icon: '📅' }
        };

        let slotPrefs = JSON.parse(localStorage.getItem('apex_v15_prefs')) || ['profit', 'winrate', 'pf', 'maxdd'];

        function normalizeDate(input) {
            if (!input) return null;
            const d = new Date(input);
            if (isNaN(d.getTime())) return input.split('T')[0];
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            const overlay = document.getElementById('modalOverlay');
            if (show) {
                overlay.classList.remove('hidden');
                setTimeout(() => { overlay.style.opacity = "1"; modal.classList.add('active'); }, 10);
            } else {
                modal.classList.remove('active');
                overlay.style.opacity = "0";
                setTimeout(() => overlay.classList.add('hidden'), 500);
            }
        }

        function closeAllModals() {
            toggleModal('entryModal', false);
            toggleModal('selectorModal', false);
        }

        function openSelector(idx) {
            activeSlotIdx = idx;
            document.getElementById('activeSlotNum').innerText = idx + 1;
            const container = document.getElementById('metricOptions');
            container.innerHTML = '';
            
            Object.keys(METRICS).forEach(key => {
                const isSelected = slotPrefs[idx] === key;
                const btn = document.createElement('button');
                btn.className = `w-full p-7 rounded-3xl text-left transition-all ${isSelected ? 'bg-emerald-500 text-white shadow-[0_0_20px_rgba(16,185,129,0.3)]' : 'bg-white/5 text-slate-500 hover:bg-white/10'}`;
                btn.innerHTML = `<div class="flex justify-between items-center"><span class="font-black uppercase tracking-widest text-[11px]">${METRICS[key].icon} ${METRICS[key].label}</span> ${isSelected ? '✅' : ''}</div>`;
                btn.onclick = () => {
                    slotPrefs[idx] = key;
                    localStorage.setItem('apex_v15_prefs', JSON.stringify(slotPrefs));
                    updateUI();
                    toggleModal('selectorModal', false);
                };
                container.appendChild(btn);
            });
            toggleModal('selectorModal', true);
        }

        async function fetchData() {
            try {
                const response = await fetch(SHEETS_URL);
                const data = await response.json();
                tradeHistory = (Array.isArray(data) ? data : []).map(r => ({ ...r, matchDate: normalizeDate(r.rawDate) }));
                updateUI();
                showToast("เชื่อมต่อคลาวด์สำเร็จ ✅");
            } catch (err) { showToast("โหมดออฟไลน์ ❌"); }
        }

        async function saveToSheet(e) {
            e.preventDefault();
            const profit = parseFloat(document.getElementById('profit').value);
            const record = {
                rawDate: document.getElementById('tradeDate').value,
                date: new Date(document.getElementById('tradeDate').value).toLocaleDateString('th-TH'),
                capital: parseFloat(document.getElementById('capital').value),
                profit: profit,
                wins: parseInt(document.getElementById('wins').value),
                losses: parseInt(document.getElementById('losses').value),
                pf: parseFloat(document.getElementById('pf').value) || 0,
                dd: parseFloat(document.getElementById('dd').value) || 0
            };
            toggleModal('entryModal', false);
            try {
                await fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(record) });
                if(profit > 0) confetti({ particleCount: 200, spread: 90, origin: { y: 0.8 }, colors: ['#10b981', '#3b82f6', '#ffffff'] });
                showToast("บันทึกข้อมูลเรียบร้อย ✅");
                setTimeout(fetchData, 1200);
            } catch (err) { showToast("เกิดข้อผิดพลาด ❌"); }
        }

        function calculateStats() {
            let p=0, w=0, l=0, dd=0, pfSum=0, best=0, startCap=30;
            tradeHistory.forEach((r, i) => {
                const pr = parseFloat(r.profit) || 0;
                p += pr; w += parseInt(r.wins) || 0; l += parseInt(r.losses) || 0;
                if (parseFloat(r.dd) > dd) dd = parseFloat(r.dd);
                pfSum += parseFloat(r.pf) || 0;
                if (pr > best) best = pr;
                if (i === tradeHistory.length - 1) startCap = parseFloat(r.capital) || 30;
            });
            return {
                profit: p, winrate: (w+l)>0 ? (w/(w+l)*100) : 0,
                pf: tradeHistory.length > 0 ? (pfSum/tradeHistory.length) : 0,
                maxdd: dd, trades: w+l, bestDay: best, avgDay: tradeHistory.length > 0 ? p/tradeHistory.length : 0,
                growth: startCap > 0 ? (p/startCap*100) : 0
            };
        }

        function updateUI() {
            const stats = calculateStats();
            const container = document.getElementById('kpiContainer');
            container.innerHTML = '';

            slotPrefs.forEach((key, idx) => {
                const config = METRICS[key];
                const card = document.createElement('div');
                card.className = `metric-card glass p-8 border-t-2 ${config.border} relative overflow-hidden group`;
                card.onclick = () => openSelector(idx);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <p class="text-[9px] uppercase font-black tracking-[0.2em] ${config.color}">${config.label}</p>
                        <span class="text-xs opacity-30 group-hover:opacity-100 transition-opacity">⚙️</span>
                    </div>
                    <h3 class="text-2xl font-black font-mono text-white number-animate">${config.format(stats[key])}</h3>
                    <div class="absolute -right-4 -bottom-4 opacity-5 group-hover:opacity-10 scale-150 transition-all"><span class="text-6xl">${config.icon}</span></div>
                `;
                container.appendChild(card);
            });

            const list = document.getElementById('historyList');
            list.innerHTML = '';
            document.getElementById('logCount').innerText = `${tradeHistory.length} รายการถูกจัดเก็บ`;
            
            [...tradeHistory].sort((a,b) => new Date(b.rawDate) - new Date(a.rawDate)).slice(0, 8).forEach(r => {
                const pr = parseFloat(r.profit) || 0;
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-6 glass border border-white/5 active:scale-95 transition-all cursor-pointer hover:bg-emerald-500/5";
                div.onclick = () => { fillForm(r); toggleModal('entryModal', true); };
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${pr >= 0 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'} border border-white/5 shadow-inner">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="${pr>=0?'M12 19V5M5 12l7-7 7 7':'M12 5v14M5 12l7 7 7-7'}"/></svg>
                        </div>
                        <div>
                            <p class="text-xs font-black text-white">${new Date(r.rawDate).toLocaleDateString('th-TH', {day:'numeric', month:'short'})}</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">W:${r.wins} L:${r.losses} • PF:${r.pf}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black font-mono ${pr >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${pr>=0?'+':''}${pr.toFixed(2)}</p>
                    </div>
                `;
                list.appendChild(div);
            });
            renderCalendar();
        }

        function renderCalendar() {
            const body = document.getElementById('calBody'); body.innerHTML = '';
            document.getElementById('calMonth').innerText = new Intl.DateTimeFormat('th-TH',{month:'long',year:'numeric'}).format(viewDate);
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m+1, 0).getDate();
            for(let i=0; i<first; i++) body.appendChild(document.createElement('div'));
            
            for(let d=1; d<=days; d++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const t = tradeHistory.find(x => x.matchDate === dStr);
                const div = document.createElement('div');
                div.className = "day-card glass border border-white/5 flex flex-col items-center justify-center cursor-pointer";
                if(t) {
                    const pr = parseFloat(t.profit) || 0;
                    const isWin = pr >= 0;
                    const winP = (parseInt(t.wins) / (parseInt(t.wins) + parseInt(t.losses)) * 100) || 0;
                    if(isWin) div.classList.add('glow-active', 'border-emerald-500/40'); else div.classList.add('border-rose-500/20');
                    div.innerHTML = `
                        <span class="absolute top-2 left-2 text-[9px] font-black ${isWin?'text-emerald-400/60':'text-rose-400/60'}">${d}</span>
                        <p class="text-center text-[12px] md:text-xl font-black font-mono ${isWin?'text-emerald-400':'text-rose-400'}">${Math.round(pr)}</p>
                        <div class="p-bar-container"><div class="p-bar-fill ${isWin?'bg-emerald-400':'bg-rose-500'}" style="width: ${winP}%"></div></div>
                    `;
                    div.onclick = () => { fillForm(t); toggleModal('entryModal', true); };
                } else {
                    div.innerHTML = `<span class="absolute top-2 left-2 text-[9px] font-black opacity-10">${d}</span>`;
                    div.onclick = () => { document.getElementById('tradeDate').value = dStr; toggleModal('entryModal', true); };
                }
                body.appendChild(div);
            }
        }

        function fillForm(r) {
            document.getElementById('tradeDate').value = r.matchDate;
            document.getElementById('profit').value = r.profit;
            document.getElementById('capital').value = r.capital;
            document.getElementById('wins').value = r.wins;
            document.getElementById('losses').value = r.losses;
            document.getElementById('pf').value = r.pf;
            document.getElementById('dd').value = r.dd;
        }

        function showToast(m) {
            const t = document.getElementById('toast') || document.createElement('div');
            t.id = 'toast'; t.className = "fixed bottom-32 left-1/2 -translate-x-1/2 glass px-12 py-5 rounded-full z-[100] text-[11px] font-black uppercase tracking-[0.2em] transition-all duration-500 opacity-0 pointer-events-none text-emerald-400 border-emerald-500/30";
            t.innerText = m; document.body.appendChild(t);
            t.style.opacity = "1"; t.style.transform = "translate(-50%, 0)";
            setTimeout(() => { t.style.opacity = "0"; t.style.transform = "translate(-50%, 40px)"; }, 3000);
        }

        window.changeMonth = (o) => { viewDate.setMonth(viewDate.getMonth() + o); updateUI(); };
        document.getElementById('tradeDate').valueAsDate = new Date();
        fetchData();
    </script>
</body>
</html>
