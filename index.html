<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA Pro Journal - Sheets v12.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input { background: rgba(30, 41, 59, 0.7) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; outline: none; border-radius: 1rem !important; padding: 0.75rem !important; width: 100%; font-size: 0.9rem; }
        input:focus { border-color: #10b981 !important; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        @media (max-width: 640px) { .cal-grid { gap: 4px; } }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .loader { border-top-color: #10b981; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 max-w-6xl mx-auto pb-24">

    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
            <div class="p-3 bg-emerald-600 rounded-2xl shadow-xl shadow-emerald-900/20">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M12 2v10"/><path d="m16 8-4 4-4-4"/><path d="M12 14v8"/><path d="m8 18 4 4 4-4"/></svg>
            </div>
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter leading-none">Apex <span class="text-emerald-500">Sheets</span></h1>
                <p id="syncStatus" class="text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-widest">☁️ Google Cloud Connected</p>
            </div>
        </div>
        <button onclick="fetchData()" class="p-3 glass rounded-xl hover:bg-white/10 transition-all">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
        </button>
    </header>

    <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10 text-center">
        <div class="glass p-6 rounded-3xl border-t-2 border-emerald-500/30 shadow-lg"><p class="text-[9px] uppercase text-emerald-400 font-black">Net Profit</p><h3 id="totalP" class="text-2xl font-bold font-mono text-white">$0.00</h3></div>
        <div class="glass p-6 rounded-3xl border-t-2 border-emerald-500/30 shadow-lg"><p class="text-[9px] uppercase text-emerald-400 font-black">Win Rate</p><h3 id="winR" class="text-2xl font-bold font-mono text-white">0%</h3></div>
        <div class="glass p-6 rounded-3xl border-t-2 border-emerald-500/30 shadow-lg"><p class="text-[9px] uppercase text-emerald-400 font-black">Avg PF</p><h3 id="avgP" class="text-2xl font-bold font-mono text-white">0.00</h3></div>
        <div class="glass p-6 rounded-3xl border-t-2 border-rose-500/30 shadow-lg"><p class="text-[9px] uppercase text-rose-400 font-black">Max DD</p><h3 id="maxD" class="text-2xl font-bold font-mono text-white">0%</h3></div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        <section class="lg:col-span-4 glass p-8 rounded-[3rem] h-fit lg:sticky lg:top-10">
            <h2 class="text-xl font-bold text-white mb-6 italic uppercase tracking-widest">Entry Terminal</h2>
            <form id="tradeForm" onsubmit="saveToSheet(event)" class="space-y-4">
                <div class="space-y-1"><label class="text-[10px] text-slate-500 uppercase font-black px-2 tracking-widest">วันที่เทส</label><input type="date" id="tradeDate" required></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] text-slate-500 uppercase font-black px-2">ทุน ($)</label><input type="number" id="capital" step="0.01" required value="30"></div>
                    <div class="space-y-1"><label class="text-[10px] text-slate-500 uppercase font-black px-2">กำไร ($)</label><input type="number" id="profit" step="0.01" required></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] text-slate-500 uppercase font-black px-2">Wins</label><input type="number" id="wins" required></div>
                    <div class="space-y-1"><label class="text-[10px] text-slate-500 uppercase font-black px-2">Losses</label><input type="number" id="losses" required></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1"><label class="text-[10px] text-emerald-500 uppercase font-black px-2">PF</label><input type="number" id="pf" step="0.01" class="border-emerald-500/20"></div>
                    <div class="space-y-1"><label class="text-[10px] text-rose-500 uppercase font-black px-2">DD (%)</label><input type="number" id="dd" step="0.01" class="border-rose-500/20"></div>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-xl uppercase text-sm tracking-widest active:scale-95 transition-all mt-4 shadow-emerald-900/20">SAVE TO CLOUD</button>
            </form>
        </section>

        <section class="lg:col-span-8">
            <div class="glass p-6 md:p-10 rounded-[3.5rem] shadow-2xl">
                <div class="flex justify-between items-center mb-8">
                    <h2 id="calMonth" class="text-3xl md:text-4xl font-black text-white uppercase italic leading-none">Month</h2>
                    <div class="flex gap-3">
                        <button onclick="changeMonth(-1)" class="p-3 glass rounded-xl hover:bg-white/10 transition-all"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg></button>
                        <button onclick="changeMonth(1)" class="p-3 glass rounded-xl hover:bg-white/10 transition-all"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg></button>
                    </div>
                </div>
                <div class="cal-grid mb-4 text-[10px] font-black text-slate-700 text-center uppercase tracking-widest">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calBody" class="cal-grid"></div>
            </div>
            <div class="mt-8 flex justify-center opacity-20 text-center">
                <p class="text-[9px] font-bold uppercase tracking-[0.3em]">EA Master Journal v12.1 - Google Sheets Cloud</p>
            </div>
        </section>
    </div>

    <div id="loader" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-12 w-12"></div>
    </div>

    <div id="toast" style="opacity: 0; transition: 0.4s; transform: translate(-50%, 50px);" class="fixed bottom-10 left-1/2 glass px-8 py-4 rounded-full z-50 bg-emerald-600 shadow-2xl">
        <span id="toastMsg" class="text-[11px] font-black uppercase text-white tracking-widest">Success</span>
    </div>

    <script>
        // 🔗 ลิงก์ Web App ที่คุณส่งมา
        const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzkaYWyrZcyKwliZZoK5JlTvdIrCcy_tjKUVr0MPtugKCG20uu3mTs1Oqhhrzy4NSGbqA/exec';
        
        let tradeHistory = [];
        let viewDate = new Date();

        async function fetchData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const response = await fetch(SHEETS_URL);
                tradeHistory = await response.json();
                updateUI();
                showToast("Synced ✅");
            } catch (err) {
                showToast("Sync Error ❌");
                console.error(err);
            }
            document.getElementById('loader').classList.add('hidden');
        }

        async function saveToSheet(e) {
            e.preventDefault();
            const date = document.getElementById('tradeDate').value;
            const record = {
                rawDate: date,
                date: new Date(date).toLocaleDateString('th-TH'),
                capital: parseFloat(document.getElementById('capital').value),
                profit: parseFloat(document.getElementById('profit').value),
                wins: parseInt(document.getElementById('wins').value),
                losses: parseInt(document.getElementById('losses').value),
                pf: parseFloat(document.getElementById('pf').value) || 0,
                dd: parseFloat(document.getElementById('dd').value) || 0
            };

            document.getElementById('loader').classList.remove('hidden');
            try {
                await fetch(SHEETS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(record)
                });
                showToast("Data Sent ✅");
                setTimeout(fetchData, 1500); // Reload after 1.5s
                document.getElementById('tradeForm').reset();
                document.getElementById('tradeDate').valueAsDate = new Date();
            } catch (err) {
                showToast("Save Error ❌");
            }
            document.getElementById('loader').classList.add('hidden');
        }

        function updateUI() {
            let p=0, w=0, l=0, dd=0, pf=0;
            tradeHistory.forEach(r => { 
                const pr = parseFloat(r.profit);
                p += pr; 
                w += parseInt(r.wins); 
                l += parseInt(r.losses); 
                if(parseFloat(r.dd) > dd) dd = parseFloat(r.dd); 
                pf += parseFloat(r.pf); 
            });
            document.getElementById('totalP').innerText = `$${p.toFixed(2)}`;
            document.getElementById('winR').innerText = (w+l)>0 ? (w/(w+l)*100).toFixed(1)+'%' : '0%';
            document.getElementById('maxD').innerText = dd.toFixed(1)+'%';
            document.getElementById('avgP').innerText = tradeHistory.length>0 ? (pf/tradeHistory.length).toFixed(2) : '0.00';
            renderCalendar();
        }

        function renderCalendar() {
            const body = document.getElementById('calBody'); body.innerHTML = '';
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            document.getElementById('calMonth').innerText = new Intl.DateTimeFormat('th-TH',{month:'long',year:'numeric'}).format(viewDate);
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m+1, 0).getDate();
            for(let i=0; i<first; i++) body.appendChild(document.createElement('div'));
            for(let d=1; d<=days; d++) {
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const t = tradeHistory.filter(x => x.rawDate === ds);
                const div = document.createElement('div');
                div.className = "min-h-[85px] md:min-h-[120px] p-2 rounded-2xl border border-white/5 bg-white/5 flex flex-col justify-between cursor-pointer active:scale-95 transition-all hover:bg-white/10 shadow-lg";
                if(t.length > 0) {
                    const win = parseFloat(t[0].profit) >= 0;
                    div.className += win ? " border-emerald-500/40 bg-emerald-500/10 shadow-emerald-900/5" : " border-rose-500/40 bg-rose-500/10 shadow-rose-900/5";
                    div.innerHTML = `<span class="text-[11px] font-black ${win?'text-emerald-400':'text-rose-400'}">${d}</span>
                                     <p class="text-center text-xs md:text-xl font-black ${win?'text-emerald-400':'text-rose-400'} font-mono">${win?'+':''}${Math.round(t[0].profit)}</p>
                                     <div class="h-1 w-full bg-white/10 rounded-full overflow-hidden"><div class="h-full ${win?'bg-emerald-500':'bg-rose-500'}" style="width: 80%"></div></div>`;
                    div.onclick = () => {
                        document.getElementById('tradeDate').value = t[0].rawDate;
                        document.getElementById('capital').value = t[0].capital;
                        document.getElementById('profit').value = t[0].profit;
                        document.getElementById('wins').value = t[0].wins;
                        document.getElementById('losses').value = t[0].losses;
                        document.getElementById('pf').value = t[0].pf;
                        document.getElementById('dd').value = t[0].dd;
                        window.scrollTo({top:0, behavior:'smooth'});
                    };
                } else {
                    div.innerHTML = `<span class="text-[10px] font-black opacity-20">${d}</span>`;
                    div.onclick = () => { document.getElementById('tradeDate').value = ds; };
                }
                body.appendChild(div);
            }
        }

        window.changeMonth = (o) => { viewDate.setMonth(viewDate.getMonth() + o); renderCalendar(); };
        function showToast(m) {
            const t = document.getElementById('toast'); document.getElementById('toastMsg').innerText = m;
            t.style.opacity = "1"; t.style.transform = "translate(-50%, 0)";
            setTimeout(() => { t.style.opacity = "0"; t.style.transform = "translate(-50%, 50px)"; }, 2500);
        }

        // Init
        document.getElementById('tradeDate').valueAsDate = new Date();
        fetchData();
    </script>
</body>
</html>
