<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apex Elite - Infinite Master v14.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        
        :root {
            --primary: #10b981;
            --blue: #3b82f6;
            --amber: #f59e0b;
            --rose: #f43f5e;
            --bg: #020617;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 40%),
                radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.08) 0px, transparent 40%);
            color: #f1f5f9; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 15px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .bottom-sheet { 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            transform: translateY(100%); 
        }
        .bottom-sheet.active { 
            transform: translateY(0); 
        }

        input { 
            background: rgba(10, 15, 25, 0.9) !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            color: white !important; 
            outline: none; 
            border-radius: 1.25rem !important; 
            padding: 1.2rem !important; 
            width: 100%; 
            text-align: center; 
            font-family: 'JetBrains Mono', monospace;
        }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        @media (max-width: 640px) { .cal-grid { gap: 6px; } }

        .day-card {
            aspect-ratio: 1/1.3;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            border-radius: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .p-bar-container {
            position: absolute; bottom: 10px; left: 10px; right: 10px; height: 6px;
            background: rgba(255,255,255,0.06); border-radius: 20px; overflow: hidden;
        }
        .p-bar-fill { height: 100%; transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 20px; }

        .metric-card {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .metric-card:active { transform: scale(0.95); }
        .metric-card.selectable:hover { border-color: rgba(255,255,255,0.3); }

        @keyframes counter-reveal {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .number-animate { animation: counter-reveal 0.5s ease-out forwards; }
    </style>
</head>
<body>

    <div class="p-4 md:p-10 max-w-6xl mx-auto">
        
        <!-- Header -->
        <header class="flex justify-between items-center mb-10 pt-4 px-2">
            <div class="flex items-center gap-5">
                <div class="p-4 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl shadow-2xl">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-black italic tracking-widest text-white">APEX <span class="text-emerald-500">INFINITE</span></h1>
                    <p id="syncStatus" class="text-[9px] text-emerald-400/60 font-bold uppercase tracking-[0.25em]">ระบบคลาวด์อัจฉริยะทำงานอยู่</p>
                </div>
            </div>
            <button onclick="fetchData()" class="p-4 glass rounded-2xl active:scale-90 transition-all shadow-lg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></button>
        </header>

        <!-- KPI Area (แตะเพื่อเปลี่ยนตัวเลขได้) -->
        <section id="kpiContainer" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
            <!-- Rendered by JS -->
        </section>

        <!-- Calendar -->
        <div class="glass p-6 md:p-10 rounded-[4rem] mb-10 border border-white/5">
            <div class="flex justify-between items-center mb-10 px-4">
                <h2 id="calMonth" class="text-3xl font-black text-white uppercase italic tracking-tighter">เดือน</h2>
                <div class="flex gap-3 bg-black/30 p-2.5 rounded-2xl">
                    <button onclick="changeMonth(-1)" class="p-3 hover:bg-white/10 rounded-xl transition-all"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg></button>
                    <button onclick="changeMonth(1)" class="p-3 hover:bg-white/10 rounded-xl transition-all"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg></button>
                </div>
            </div>
            <div class="cal-grid mb-6 text-[10px] font-black text-slate-600 text-center uppercase tracking-[0.3em]">
                <div>อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div>
            </div>
            <div id="calBody" class="cal-grid"></div>
        </div>

        <!-- Recent Logs -->
        <div class="mb-10 px-2 flex justify-between items-end">
            <h2 class="text-lg font-black text-white/50 uppercase tracking-widest">ประวัติย้อนหลัง</h2>
            <span class="text-[9px] text-slate-600 font-bold uppercase tracking-widest">Master Edition</span>
        </div>
        <div id="historyList" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-28"></div>
    </div>

    <!-- ปุ่มลอยบันทึก (FAB) -->
    <div class="fixed bottom-12 right-10 z-40">
        <button onclick="toggleModal('entryModal', true)" class="w-22 h-22 p-6 bg-gradient-to-tr from-emerald-600 to-emerald-400 text-white rounded-[2.5rem] shadow-2xl flex items-center justify-center active:scale-90 transition-all border border-white/20">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <!-- 🛸 หน้าจอเปิดบันทึกข้อมูล -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/85 backdrop-blur-xl z-[50] hidden opacity-0 transition-all duration-500"></div>
    <div id="entryModal" class="bottom-sheet fixed bottom-0 left-0 right-0 glass rounded-t-[4.5rem] z-[60] p-10 pb-16 shadow-2xl max-w-2xl mx-auto">
        <div class="w-20 h-1.5 bg-white/10 rounded-full mx-auto mb-10"></div>
        <form id="tradeForm" onsubmit="saveToSheet(event)" class="space-y-8">
            <input type="date" id="tradeDate" required class="!w-fit mx-auto block !p-3 !text-[11px] !bg-emerald-500/10 !text-emerald-400 !font-black uppercase tracking-[0.2em] border-none">
            <div class="grid grid-cols-2 gap-8">
                <div class="space-y-2"><label class="text-[11px] text-emerald-400 font-black uppercase text-center block">กำไรวันนี้ ($)</label><input type="number" id="profit" step="0.01" required></div>
                <div class="space-y-2"><label class="text-[11px] text-blue-400 font-black uppercase text-center block">เงินทุนเริ่มต้น ($)</label><input type="number" id="capital" step="0.01" required value="30"></div>
                <div class="space-y-2"><label class="text-[11px] text-slate-400 font-black uppercase text-center block">ไม้ที่ชนะ</label><input type="number" id="wins" required value="0"></div>
                <div class="space-y-2"><label class="text-[11px] text-slate-400 font-black uppercase text-center block">ไม้ที่แพ้</label><input type="number" id="losses" required value="0"></div>
                <div class="space-y-2"><label class="text-[11px] text-slate-500 font-black uppercase text-center block italic">ค่า PF</label><input type="number" id="pf" step="0.01" value="0"></div>
                <div class="space-y-2"><label class="text-[11px] text-slate-500 font-black uppercase text-center block italic">ค่า DD (%)</label><input type="number" id="dd" step="0.01" value="0"></div>
            </div>
            <div class="flex gap-5">
                <button type="button" onclick="toggleModal('entryModal', false)" class="flex-1 bg-white/5 py-6 rounded-3xl font-black uppercase text-xs text-slate-500">ยกเลิก</button>
                <button type="submit" class="flex-[2] bg-emerald-600 py-6 rounded-3xl font-black uppercase text-xs text-white shadow-lg active:scale-95 transition-all">บันทึกข้อมูล</button>
            </div>
        </form>
    </div>

    <!-- 🛸 หน้าจอเลือกตัวบ่งชี้ (Metric Selector) -->
    <div id="selectorModal" class="bottom-sheet fixed bottom-0 left-0 right-0 glass rounded-t-[4.5rem] z-[60] p-8 pb-12 shadow-2xl max-w-xl mx-auto border-t border-white/10">
        <div class="w-20 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-white uppercase tracking-wider">ปรับแต่งการแสดงผล</h2>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em] mt-2">เลือกข้อมูลที่ต้องการในช่องที่ <span id="activeSlotNum" class="text-emerald-400">1</span></p>
        </div>
        <div id="metricOptions" class="grid grid-cols-1 gap-3 max-h-[55vh] overflow-y-auto pr-2 px-1">
            <!-- Metric options injected by JS -->
        </div>
        <button onclick="toggleModal('selectorModal', false)" class="w-full bg-white/5 py-5 rounded-3xl font-black uppercase text-xs text-slate-500 mt-8 tracking-widest border border-white/5 active:bg-white/10 transition-colors">ย้อนกลับ</button>
    </div>

    <script>
        const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzkaYWyrZcyKwliZZoK5JlTvdIrCcy_tjKUVr0MPtugKCG20uu3mTs1Oqhhrzy4NSGbqA/exec';
        let tradeHistory = [];
        let viewDate = new Date();
        let activeSlot = 0;

        // 📚 Metric Library with Icons and Full Thai Descriptions
        const METRICS = {
            profit: { 
                icon: '💰',
                label: 'กำไรสุทธิทั้งหมด', 
                desc: 'ยอดรวมผลกำไรและขาดทุนสะสมทั้งหมด ตั้งแต่วันแรกที่บันทึก', 
                color: 'text-emerald-500', 
                border: 'border-emerald-500/30', 
                format: v => `$${v.toFixed(2)}` 
            },
            winrate: { 
                icon: '🎯',
                label: 'อัตราการชนะ (%)', 
                desc: 'เปอร์เซ็นต์จำนวนวันที่เทรดชนะ เมื่อเทียบกับจำนวนวันเทรดทั้งหมด', 
                color: 'text-blue-400', 
                border: 'border-blue-500/20', 
                format: v => `${v.toFixed(1)}%` 
            },
            pf: { 
                icon: '⚖️',
                label: 'เฉลี่ยความคุ้มค่า (PF)', 
                desc: 'ค่า Profit Factor เฉลี่ยต่อวัน ยิ่งสูงแปลว่ากลยุทธ์มีความเสี่ยงต่ำกำไรสูง', 
                color: 'text-amber-400', 
                border: 'border-amber-500/20', 
                format: v => v.toFixed(2) 
            },
            maxdd: { 
                icon: '📉',
                label: 'ขาดทุนสูงสุด (DD)', 
                desc: 'จุดที่พอร์ตเคยติดลบ (Drawdown) หนักที่สุดเท่าที่เคยบันทึกมา', 
                color: 'text-rose-500', 
                border: 'border-rose-500/20', 
                format: v => `${v.toFixed(1)}%` 
            },
            trades: { 
                icon: '📦',
                label: 'จำนวนไม้ที่เทรด', 
                desc: 'ยอดรวมออเดอร์ทั้งหมดที่ EA เปิดในระยะเวลาที่บันทึกข้อมูล', 
                color: 'text-indigo-400', 
                border: 'border-indigo-500/20', 
                format: v => `${v} ไม้` 
            },
            avgDay: { 
                icon: '📈',
                label: 'กำไรเฉลี่ยต่อวัน', 
                desc: 'กำไรสุทธิเฉลี่ยที่คุณทำได้ในแต่ละวันที่มีการเทรด', 
                color: 'text-cyan-400', 
                border: 'border-cyan-500/20', 
                format: v => `$${v.toFixed(2)}` 
            },
            bestDay: { 
                icon: '⭐',
                label: 'กำไรสูงสุดใน 1 วัน', 
                desc: 'ยอดสถิติกำไรต่อวันที่สูงที่สุดที่คุณเคยทำได้', 
                color: 'text-lime-400', 
                border: 'border-lime-500/20', 
                format: v => `$${v.toFixed(2)}` 
            },
            growth: { 
                icon: '🚀',
                label: 'การเติบโตสะสม (%)', 
                desc: 'เปอร์เซ็นต์การขยายตัวของพอร์ตปัจจุบัน เมื่อเทียบกับทุนเริ่มต้น $30', 
                color: 'text-pink-400', 
                border: 'border-pink-500/20', 
                format: v => `${v.toFixed(1)}%` 
            }
        };

        let slotPrefs = JSON.parse(localStorage.getItem('apex_slot_prefs')) || ['profit', 'winrate', 'pf', 'maxdd'];

        function normalizeDate(dStr) {
            const d = new Date(dStr);
            return isNaN(d.getTime()) ? dStr.split('T')[0] : d.toLocaleDateString('sv-SE');
        }

        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            const overlay = document.getElementById('modalOverlay');
            if (show) {
                overlay.classList.remove('hidden');
                setTimeout(() => { overlay.style.opacity = "1"; modal.classList.add('active'); }, 10);
            } else {
                modal.classList.remove('active');
                overlay.style.opacity = "0";
                setTimeout(() => overlay.classList.add('hidden'), 500);
            }
        }

        function openSelector(slotIdx) {
            activeSlot = slotIdx;
            document.getElementById('activeSlotNum').innerText = slotIdx + 1;
            const container = document.getElementById('metricOptions');
            container.innerHTML = '';
            
            Object.keys(METRICS).forEach(key => {
                const btn = document.createElement('button');
                const isSelected = slotPrefs[slotIdx] === key;
                const m = METRICS[key];
                
                btn.className = `group w-full p-5 rounded-[2rem] text-left transition-all border ${isSelected ? 'bg-emerald-600 border-emerald-400 shadow-lg shadow-emerald-900/20' : 'bg-white/5 border-white/5 text-slate-400 hover:bg-white/10 hover:border-white/20'}`;
                
                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-2xl">${m.icon}</span>
                        <div>
                            <p class="font-black uppercase tracking-widest text-sm ${isSelected ? 'text-white' : 'text-slate-200'}">${m.label}</p>
                            <p class="text-[10px] opacity-60 mt-1 uppercase tracking-wide leading-relaxed ${isSelected ? 'text-emerald-100' : 'text-slate-500'}">${m.desc}</p>
                        </div>
                    </div>
                `;
                
                btn.onclick = () => {
                    slotPrefs[slotIdx] = key;
                    localStorage.setItem('apex_slot_prefs', JSON.stringify(slotPrefs));
                    updateUI();
                    toggleModal('selectorModal', false);
                };
                container.appendChild(btn);
            });
            toggleModal('selectorModal', true);
        }

        async function fetchData() {
            try {
                const response = await fetch(SHEETS_URL);
                const data = await response.json();
                tradeHistory = (Array.isArray(data) ? data : []).map(r => ({ ...r, matchDate: normalizeDate(r.rawDate) }));
                updateUI();
                showToast("ข้อมูลเป็นปัจจุบันแล้ว ✅");
            } catch (err) { showToast("ซิงค์ไม่สำเร็จ ❌"); }
        }

        async function saveToSheet(e) {
            e.preventDefault();
            const profit = parseFloat(document.getElementById('profit').value);
            const record = {
                rawDate: document.getElementById('tradeDate').value,
                date: new Date(document.getElementById('tradeDate').value).toLocaleDateString('th-TH'),
                capital: parseFloat(document.getElementById('capital').value),
                profit: profit,
                wins: parseInt(document.getElementById('wins').value),
                losses: parseInt(document.getElementById('losses').value),
                pf: parseFloat(document.getElementById('pf').value) || 0,
                dd: parseFloat(document.getElementById('dd').value) || 0
            };
            toggleModal('entryModal', false);
            try {
                await fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(record) });
                if(profit > 0) confetti({ particleCount: 150, spread: 70, origin: { y: 0.75 } });
                fetchData();
            } catch (err) { showToast("บันทึกล้มเหลว ❌"); }
        }

        function calculateMetrics() {
            let p=0, w=0, l=0, dd=0, pfSum=0, best=0, startCap=30;
            tradeHistory.forEach((r, i) => {
                const pr = parseFloat(r.profit) || 0;
                p += pr; w += parseInt(r.wins) || 0; l += parseInt(r.losses) || 0;
                if (parseFloat(r.dd) > dd) dd = parseFloat(r.dd);
                pfSum += parseFloat(r.pf) || 0;
                if (pr > best) best = pr;
                if (i === tradeHistory.length - 1) startCap = parseFloat(r.capital) || 30;
            });
            return {
                profit: p, winrate: (w+l) > 0 ? (w/(w+l)*100) : 0,
                pf: tradeHistory.length > 0 ? (pfSum/tradeHistory.length) : 0,
                maxdd: dd, trades: w+l, avgDay: tradeHistory.length > 0 ? (p/tradeHistory.length) : 0,
                bestDay: best, growth: startCap > 0 ? (p / startCap * 100) : 0
            };
        }

        function updateUI() {
            const stats = calculateMetrics();
            const kpiContainer = document.getElementById('kpiContainer');
            kpiContainer.innerHTML = '';

            slotPrefs.forEach((key, idx) => {
                const config = METRICS[key];
                const card = document.createElement('div');
                card.className = `metric-card glass p-7 rounded-[2.5rem] border-t-2 ${config.border} relative overflow-hidden group select-none`;
                card.onclick = () => openSelector(idx);
                card.innerHTML = `
                    <div class="absolute -right-2 -bottom-2 opacity-5 scale-150 transition-transform group-hover:scale-[2] group-hover:opacity-10"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"/></svg></div>
                    <div class="flex justify-between items-start mb-1.5">
                        <p class="text-[9px] uppercase font-black tracking-[0.2em] ${config.color}">${config.label}</p>
                        <span class="text-xs opacity-30">${config.icon}</span>
                    </div>
                    <h3 class="text-xl font-black font-mono text-white number-animate">${config.format(stats[key])}</h3>
                `;
                kpiContainer.appendChild(card);
            });

            // History List
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            [...tradeHistory].sort((a,b) => new Date(b.rawDate) - new Date(a.rawDate)).slice(0, 8).forEach(r => {
                const pr = parseFloat(r.profit) || 0;
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-6 glass rounded-[2.5rem] active:scale-95 transition-all cursor-pointer border border-white/5";
                div.onclick = () => {
                    document.getElementById('tradeDate').value = r.matchDate;
                    document.getElementById('profit').value = r.profit;
                    document.getElementById('capital').value = r.capital;
                    document.getElementById('wins').value = r.wins;
                    document.getElementById('losses').value = r.losses;
                    document.getElementById('pf').value = r.pf;
                    document.getElementById('dd').value = r.dd;
                    toggleModal('entryModal', true);
                };
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${pr >= 0 ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/10' : 'bg-rose-500/10 text-rose-400 border border-rose-500/10'}">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="${pr>=0?'M12 19V5M5 12l7-7 7 7':'M12 5v14M5 12l7 7 7-7'}"/></svg>
                        </div>
                        <div>
                            <p class="text-xs font-black text-white">${new Date(r.rawDate).toLocaleDateString('th-TH', {day:'numeric', month:'short'})}</p>
                            <p class="text-[9px] text-slate-500 font-bold uppercase mt-0.5 tracking-wider">WIN: ${r.wins} • LOSS: ${r.losses}</p>
                        </div>
                    </div>
                    <p class="text-lg font-black font-mono ${pr >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${pr>=0?'+':''}${pr.toFixed(2)}</p>
                `;
                list.appendChild(div);
            });
            renderCalendar();
        }

        function renderCalendar() {
            const body = document.getElementById('calBody'); body.innerHTML = '';
            document.getElementById('calMonth').innerText = new Intl.DateTimeFormat('th-TH',{month:'long',year:'numeric'}).format(viewDate);
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m+1, 0).getDate();
            for(let i=0; i<first; i++) body.appendChild(document.createElement('div'));
            for(let d=1; d<=days; d++) {
                const dayStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const t = tradeHistory.find(x => x.matchDate === dayStr);
                const div = document.createElement('div');
                div.className = "day-card glass border border-white/5 flex flex-col items-center justify-center cursor-pointer";
                if(t) {
                    const pr = parseFloat(t.profit) || 0;
                    const isWin = pr >= 0;
                    const winP = (parseInt(t.wins) / (parseInt(t.wins) + parseInt(t.losses)) * 100) || 0;
                    div.classList.add(isWin ? 'border-emerald-500/40 bg-emerald-500/5' : 'border-rose-500/30 bg-rose-500/5');
                    div.innerHTML = `
                        <span class="absolute top-2.5 left-2.5 text-[9px] font-black ${isWin?'text-emerald-500/40':'text-rose-500/40'}">${d}</span>
                        <p class="text-[11px] md:text-lg font-black font-mono ${isWin?'text-emerald-400':'text-rose-400'}">${Math.round(pr)}</p>
                        <div class="p-bar-container"><div class="p-bar-fill ${isWin?'bg-emerald-500':'bg-rose-500'}" style="width: ${winP}%"></div></div>
                    `;
                    div.onclick = () => {
                         document.getElementById('tradeDate').value = t.matchDate;
                         document.getElementById('profit').value = t.profit;
                         document.getElementById('capital').value = t.capital;
                         document.getElementById('wins').value = t.wins;
                         document.getElementById('losses').value = t.losses;
                         document.getElementById('pf').value = t.pf;
                         document.getElementById('dd').value = t.dd;
                         toggleModal('entryModal', true);
                    };
                } else {
                    div.innerHTML = `<span class="absolute top-2.5 left-2.5 text-[9px] font-black opacity-20">${d}</span>`;
                    div.onclick = () => { document.getElementById('tradeDate').value = dayStr; toggleModal('entryModal', true); };
                }
                body.appendChild(div);
            }
        }

        function showToast(m) {
            const t = document.getElementById('toast') || document.createElement('div');
            t.id = 'toast'; t.className = "fixed bottom-32 left-1/2 -translate-x-1/2 glass px-10 py-5 rounded-[2rem] z-[100] text-xs font-black uppercase tracking-widest transition-all duration-500 opacity-0 pointer-events-none border border-white/10";
            t.innerText = m; document.body.appendChild(t);
            t.style.opacity = "1"; t.style.transform = "translate(-50%, 0)";
            setTimeout(() => { t.style.opacity = "0"; t.style.transform = "translate(-50%, 50px)"; }, 2500);
        }

        window.changeMonth = (o) => { viewDate.setMonth(viewDate.getMonth() + o); updateUI(); };
        document.getElementById('tradeDate').valueAsDate = new Date();
        fetchData();
    </script>
</body>
</html>
